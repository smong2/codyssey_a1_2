version: '3.8'

services:
  prompt-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: prompt-manager-app
    volumes:
      # 로컬 src 폴더를 컨테이너 내 /app/src로 매핑
      - ../src:/app/src
      # data 폴더를 컨테이너 내부와 동기화하여 데이터 유지
      - ../src/data:/app/src/data
    env_file:
      - ../src/.env
    environment:
      - PYTHONUNBUFFERED=1
    # 터미널 입력을 위해 tty와 stdin 열어줌
    tty: true
    stdin_open: true